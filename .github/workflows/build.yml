name: Build Node App

on: push

jobs:
  build-node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: node --version
      - run: npm --version

      - run: npm install
      - run: node index.js
